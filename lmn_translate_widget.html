<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMN Translate</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Mulish:wght@700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: transparent; padding: 0; margin: 0; overflow: hidden; }
  .tw { background: #fff; border: 1.5px solid #c5d8f5; border-radius: 16px; overflow: hidden; width: 100%; display: flex; flex-direction: column; }
  .tw-header { background: #f0f4ff; padding: 6px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1.5px solid #c5d8f5; }
  .tw-header i { font-size: 18px; color: #1565c0; }
  .tw-header span { font-size: 13px; font-weight: 700; color: #1565c0; letter-spacing: 0.05em; text-transform: uppercase; font-family: 'Mulish', sans-serif; }
  .tw-body { display: grid; grid-template-columns: 1fr 1fr; }
  .tw-panel { padding: 8px 12px; }
  .tw-panel.left { border-right: 1.5px solid #e8f0fe; }
  .tw-lang { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #1565c0; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .tw-text { font-size: 15px; font-weight: 600; color: #1a2535; line-height: 1.3; min-height: 28px; }
  .tw-text.translated { color: #1565c0; }
  .tw-text.placeholder { color: #b0c4e8; font-weight: 400; font-style: italic; font-size: 14px; }
  .tw-text.tw-error { color: #e53935; font-size: 13px; font-weight: 400; font-style: italic; }
  .tw-footer { border-top: 1.5px solid #e8f0fe; padding: 7px 12px; display: flex; align-items: center; gap: 10px; }
  select { flex: 1; height: 34px; border: 1.5px solid #c5d8f5; border-radius: 10px; padding: 0 10px; font-size: 13px; font-weight: 600; color: #1565c0; background: #f0f4ff; cursor: pointer; outline: none; font-family: 'DM Sans', sans-serif; }
  select:focus { border-color: #1565c0; }
  .tw-btn { height: 34px; padding: 0 18px; border-radius: 10px; border: none; background: #1565c0; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
  .tw-btn:hover { background: #0d47a1; }
  .tw-btn:disabled { background: #90afd4; cursor: not-allowed; }
  .tw-btn i { font-size: 15px; }
  .tw-speak-btn { margin-top: 6px; height: 34px; padding: 0 14px; border-radius: 10px; border: 1.5px solid #c5d8f5; background: #f0f4ff; color: #1565c0; font-size: 12px; font-weight: 700; cursor: pointer; display: none; align-items: center; gap: 6px; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .tw-speak-btn:hover:not(:disabled) { background: #dbeafe; border-color: #1565c0; }
  .tw-speak-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .tw-speak-btn.visible { display: inline-flex; }
  .tw-speak-btn.speaking { background: #1565c0; color: #fff; border-color: #1565c0; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="tw">
  <div class="tw-header">
    <i class="ti ti-world" aria-hidden="true"></i>
    <span>Translate</span>
  </div>
  <div class="tw-body">
    <div class="tw-panel left">
      <div class="tw-lang"><i class="ti ti-flag" aria-hidden="true"></i>English</div>
      <!-- EDIT: change this phrase for each slide -->
      <div class="tw-text" id="twSource">How can I come here?</div>
    </div>
    <div class="tw-panel">
      <div class="tw-text placeholder" id="twResult">Translation will appear here</div>
      <button class="tw-speak-btn" id="twSpeakBtn" onclick="speakTranslation()" disabled aria-label="Listen to translation">
        <i class="ti ti-volume" aria-hidden="true" id="twSpeakIcon"></i>
        Listen
      </button>
    </div>
  </div>
  <div class="tw-footer">
    <select id="twLang">
      <option value="">Your language...</option>
      <option disabled>── Your students' languages ──</option>
      <option value="am-ET">Amharic</option>
      <option value="ar-SA">Arabic</option>
      <option value="bn-IN">Bengali</option>
      <option value="om-ET">Oromo</option>
      <option value="so-SO">Somali</option>
      <option value="ti-ET">Tigrinya</option>
      <option disabled>── All languages ──</option>
      <option value="af">Afrikaans</option>
      <option value="sq">Albanian</option>
      <option value="ar-SA">Arabic</option>
      <option value="hy">Armenian</option>
      <option value="az">Azerbaijani</option>
      <option value="eu">Basque</option>
      <option value="be">Belarusian</option>
      <option value="bn-IN">Bengali</option>
      <option value="bs">Bosnian</option>
      <option value="bg">Bulgarian</option>
      <option value="ca">Catalan</option>
      <option value="zh-CN">Chinese (Simplified)</option>
      <option value="zh-TW">Chinese (Traditional)</option>
      <option value="hr">Croatian</option>
      <option value="cs">Czech</option>
      <option value="da">Danish</option>
      <option value="nl">Dutch</option>
      <option value="eo">Esperanto</option>
      <option value="et">Estonian</option>
      <option value="tl">Filipino</option>
      <option value="fi">Finnish</option>
      <option value="fr">French</option>
      <option value="gl">Galician</option>
      <option value="ka">Georgian</option>
      <option value="de">German</option>
      <option value="el">Greek</option>
      <option value="gu">Gujarati</option>
      <option value="ht">Haitian Creole</option>
      <option value="he">Hebrew</option>
      <option value="hi">Hindi</option>
      <option value="hu">Hungarian</option>
      <option value="is">Icelandic</option>
      <option value="id">Indonesian</option>
      <option value="ga">Irish</option>
      <option value="it">Italian</option>
      <option value="ja">Japanese</option>
      <option value="kn">Kannada</option>
      <option value="kk">Kazakh</option>
      <option value="km">Khmer</option>
      <option value="ko">Korean</option>
      <option value="ku">Kurdish</option>
      <option value="ky">Kyrgyz</option>
      <option value="lo">Lao</option>
      <option value="lv">Latvian</option>
      <option value="lt">Lithuanian</option>
      <option value="mk">Macedonian</option>
      <option value="ms">Malay</option>
      <option value="ml">Malayalam</option>
      <option value="mt">Maltese</option>
      <option value="mi">Maori</option>
      <option value="mr">Marathi</option>
      <option value="mn">Mongolian</option>
      <option value="my">Myanmar (Burmese)</option>
      <option value="ne">Nepali</option>
      <option value="no">Norwegian</option>
      <option value="ps">Pashto</option>
      <option value="fa">Persian</option>
      <option value="pl">Polish</option>
      <option value="pt">Portuguese</option>
      <option value="pa">Punjabi</option>
      <option value="ro">Romanian</option>
      <option value="ru">Russian</option>
      <option value="sr">Serbian</option>
      <option value="si">Sinhala</option>
      <option value="sk">Slovak</option>
      <option value="sl">Slovenian</option>
      <option value="es">Spanish</option>
      <option value="sw">Swahili</option>
      <option value="sv">Swedish</option>
      <option value="tg">Tajik</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="th">Thai</option>
      <option value="tr">Turkish</option>
      <option value="tk">Turkmen</option>
      <option value="uk">Ukrainian</option>
      <option value="ur">Urdu</option>
      <option value="uz">Uzbek</option>
      <option value="vi">Vietnamese</option>
      <option value="cy">Welsh</option>
      <option value="xh">Xhosa</option>
      <option value="yi">Yiddish</option>
      <option value="yo">Yoruba</option>
      <option value="zu">Zulu</option>
    </select>
    <button class="tw-btn" id="twBtn" onclick="doTranslate()">
      <i class="ti ti-language" aria-hidden="true"></i>
      Translate
    </button>
  </div>
</div>

<script>
  // Tell parent iFrame our exact height so it can resize
  function reportHeight() {
    const h = document.body.scrollHeight;
    window.parent.postMessage({ frameHeight: h }, '*');
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);

  async function doTranslate() {
    const lang   = document.getElementById('twLang').value;
    const phrase = document.getElementById('twSource').textContent.trim();
    const btn    = document.getElementById('twBtn');
    const result = document.getElementById('twResult');
    const speakBtn = document.getElementById('twSpeakBtn');

    if (!lang) {
      result.textContent = 'Please choose a language first.';
      result.className = 'tw-text tw-error';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader" style="font-size:15px;animation:spin 0.8s linear infinite;display:inline-block;"></i> Translating…';
    result.className = 'tw-text placeholder';
    result.textContent = 'Translating…';
    speakBtn.classList.remove('visible');

    try {
      // MyMemory free API — reliable, no key needed, 5000 chars/day free
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(phrase)}&langpair=en-US|${lang}`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.responseStatus === 200) {
        result.textContent = data.responseData.translatedText;
        result.className = 'tw-text translated';
        speakBtn.disabled = false;
        speakBtn.classList.add('visible');
      } else {
        throw new Error('Translation failed');
      }
    } catch(e) {
      result.textContent = 'Translation failed. Please try again.';
      result.className = 'tw-text tw-error';
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-language" style="font-size:15px"></i> Translate';
  }

  // Auto-translate when language is selected
  document.getElementById('twLang').addEventListener('change', () => doTranslate());

  // ── Text-to-Speech ──
  function speakTranslation() {
    const text = document.getElementById('twResult').textContent;
    const lang = document.getElementById('twLang').value;
    const btn  = document.getElementById('twSpeakBtn');
    const icon = document.getElementById('twSpeakIcon');
    if (!text || !lang) return;
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      btn.classList.remove('speaking');
      icon.className = 'ti ti-volume';
      return;
    }
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    utterance.rate = 0.9;
    utterance.onstart = () => { btn.classList.add('speaking'); icon.className = 'ti ti-volume-off'; };
    utterance.onend   = () => { btn.classList.remove('speaking'); icon.className = 'ti ti-volume'; };
    utterance.onerror = () => { btn.classList.remove('speaking'); icon.className = 'ti ti-volume'; };
    window.speechSynthesis.speak(utterance);
  }
</script>
</body>
</html>
